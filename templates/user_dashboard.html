<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#060606">
<title>Conduit — Your Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
    --bg: #060606;
    --surface: #0e0e10;
    --surface-2: #15151a;
    --border: rgba(255,255,255,0.06);
    --border-2: rgba(255,255,255,0.12);
    --text: #f4f4f5;
    --text-2: #a1a1aa;
    --text-3: #71717a;
    --accent: #67e8f9;
    --accent-glow: rgba(103,232,249,0.35);
    --success: #4ade80;
    --warning: #facc15;
    --danger: #f87171;
    --serif: 'Instrument Serif', ui-serif, Georgia, serif;
    --sans: 'Geist', system-ui, -apple-system, sans-serif;
    --mono: 'Geist Mono', ui-monospace, 'SF Mono', monospace;
  }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    background-image:
      radial-gradient(1200px circle at 0% 0%, rgba(103,232,249,0.04), transparent 50%),
      radial-gradient(900px circle at 100% 20%, rgba(168,85,247,0.03), transparent 50%);
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; text-underline-offset: 3px; }
  button { font-family: inherit; }

  @keyframes breathe {
    0%,100% { transform: scale(1); box-shadow: 0 0 0 3px var(--accent-glow), 0 0 18px var(--accent-glow); }
    50%     { transform: scale(1.15); box-shadow: 0 0 0 5px var(--accent-glow), 0 0 24px var(--accent-glow); }
  }
  @keyframes breatheGreen {
    0%,100% { box-shadow: 0 0 0 3px rgba(74,222,128,0.25), 0 0 14px rgba(74,222,128,0.4); }
    50%     { box-shadow: 0 0 0 5px rgba(74,222,128,0.3), 0 0 22px rgba(74,222,128,0.5); }
  }
  @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .topnav {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: saturate(120%) blur(12px);
    background: rgba(6,6,6,0.72);
    border-bottom: 1px solid var(--border);
  }
  .topnav .inner {
    max-width: 1240px; margin: 0 auto; padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between; gap: 24px;
  }
  .brand {
    font-family: var(--mono); font-weight: 600; font-size: 13px;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--text);
    text-decoration: none;
  }
  .brand .glyph {
    display: inline-block; width: 9px; height: 9px; margin-right: 8px; vertical-align: 2px;
    background: var(--accent); border-radius: 50%;
    box-shadow: 0 0 0 3px var(--accent-glow), 0 0 18px var(--accent-glow);
    animation: breathe 2.6s ease-in-out infinite;
  }
  .phone-cta {
    font-family: var(--mono); font-weight: 500; font-size: 13px;
    color: var(--text); background: var(--surface); border: 1px solid var(--border-2);
    padding: 8px 14px; border-radius: 999px; display: inline-flex; align-items: center; gap: 8px;
    transition: all .18s ease;
  }
  .phone-cta:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }
  .phone-cta .pulse {
    width: 6px; height: 6px; border-radius: 50%; background: var(--success);
    box-shadow: 0 0 0 3px rgba(74,222,128,0.25);
    animation: breatheGreen 1.8s ease-in-out infinite;
  }
  .nav-chip {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-3); padding: 6px 12px; border-radius: 999px;
    border: 1px solid var(--border); text-decoration: none;
    transition: all .18s ease;
  }
  .nav-chip:hover { color: var(--text); border-color: var(--border-2); text-decoration: none; }

  .wrap { max-width: 1240px; margin: 0 auto; padding: 40px 28px 80px; }

  /* page header */
  .page-header {
    padding: 32px 0 40px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-end; justify-content: space-between; gap: 24px;
    flex-wrap: wrap;
  }
  .page-header h1 {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(32px, 5vw, 52px); line-height: 1.05;
    letter-spacing: -0.02em; margin: 0 0 8px; color: var(--text);
  }
  .page-header h1 em { font-style: italic; color: var(--accent); }
  .page-header .sub {
    font-family: var(--mono); font-size: 12px; color: var(--text-3);
    letter-spacing: 0.05em;
  }
  .page-header .actions { display: flex; gap: 10px; align-items: center; }

  /* copy-link button */
  .copy-btn {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
    color: var(--text-3); background: var(--surface); border: 1px solid var(--border);
    padding: 8px 14px; border-radius: 999px; cursor: pointer;
    transition: all .18s ease; display: inline-flex; align-items: center; gap: 7px;
  }
  .copy-btn:hover { color: var(--accent); border-color: rgba(103,232,249,0.3); }
  .copy-btn .icon { font-size: 12px; }

  /* toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface-2); border: 1px solid var(--border-2);
    color: var(--success); font-family: var(--mono); font-size: 12px;
    padding: 10px 18px; border-radius: 999px;
    pointer-events: none; opacity: 0; transition: opacity .2s ease;
    z-index: 100;
  }
  .toast.show { opacity: 1; }

  /* live banner */
  .live-banner {
    margin: 28px 0 0; padding: 18px 22px;
    background: linear-gradient(135deg, rgba(250,204,21,0.06), rgba(250,204,21,0.02));
    border: 1px solid rgba(250,204,21,0.22); border-radius: 14px;
    display: flex; align-items: center; justify-content: space-between; gap: 20px;
    flex-wrap: wrap; animation: fadeUp .4s ease both;
  }
  .live-banner .left { display: flex; align-items: center; gap: 14px; }
  .live-dot {
    width: 9px; height: 9px; border-radius: 50%; background: var(--warning);
    box-shadow: 0 0 0 3px rgba(250,204,21,0.25); flex-shrink: 0;
    animation: breatheWarn 1.4s ease-in-out infinite;
  }
  @keyframes breatheWarn {
    0%,100% { box-shadow: 0 0 0 3px rgba(250,204,21,0.25); }
    50%     { box-shadow: 0 0 0 5px rgba(250,204,21,0.35), 0 0 20px rgba(250,204,21,0.4); }
  }
  .live-banner .title {
    font-family: var(--serif); font-size: 18px; letter-spacing: -0.01em; color: var(--text);
  }
  .live-banner .meta {
    font-family: var(--mono); font-size: 11px; color: var(--text-3);
    letter-spacing: 0.06em; margin-top: 2px;
  }
  .live-progress { display: flex; align-items: center; gap: 10px; }
  .live-progress .bar-wrap {
    width: 120px; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;
  }
  .live-progress .bar { height: 100%; background: var(--warning); border-radius: 2px; transition: width .5s ease; }
  .live-progress .pct { font-family: var(--mono); font-size: 11px; color: var(--text-3); }
  .watch-btn {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
    padding: 9px 16px; border-radius: 999px;
    background: rgba(250,204,21,0.1); border: 1px solid rgba(250,204,21,0.3);
    color: var(--warning); cursor: pointer; text-decoration: none;
    transition: all .18s ease; display: inline-block;
  }
  .watch-btn:hover { background: rgba(250,204,21,0.18); text-decoration: none; }

  /* section header */
  .section-head {
    display: flex; justify-content: space-between; align-items: baseline; gap: 16px;
    padding: 36px 0 18px;
  }
  .section-head h2 {
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--text-3); font-weight: 500; margin: 0;
  }
  .section-head .count {
    font-family: var(--mono); font-size: 11px; color: var(--text-3);
  }

  /* video card grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }
  @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    transition: all .2s ease; animation: fadeUp .4s ease both;
  }
  .card:hover { border-color: var(--border-2); transform: translateY(-2px); }

  .card .thumb {
    aspect-ratio: 16/9; background: #000; position: relative; overflow: hidden;
    background-image: linear-gradient(135deg, #1a1a1f 0%, #0a0a0c 100%);
  }
  .card .thumb video {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .card .thumb .empty {
    display: flex; align-items: center; justify-content: center; height: 100%;
    font-family: var(--mono); font-size: 11px; color: var(--text-3); letter-spacing: 0.1em;
    flex-direction: column; gap: 10px;
  }
  .card .thumb .skel-bars {
    width: 60px; display: flex; gap: 4px; align-items: flex-end;
  }
  .card .thumb .skel-bars span {
    flex: 1; background: rgba(255,255,255,0.08); border-radius: 2px;
    animation: skelPulse 1.4s ease-in-out infinite;
  }
  .card .thumb .skel-bars span:nth-child(1) { height: 24px; animation-delay: 0ms; }
  .card .thumb .skel-bars span:nth-child(2) { height: 36px; animation-delay: 120ms; }
  .card .thumb .skel-bars span:nth-child(3) { height: 18px; animation-delay: 240ms; }
  .card .thumb .skel-bars span:nth-child(4) { height: 30px; animation-delay: 360ms; }
  @keyframes skelPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  .card .badge {
    position: absolute; top: 10px; left: 10px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 3px 10px; border-radius: 999px;
    backdrop-filter: blur(8px);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .card .badge.done {
    background: rgba(74,222,128,0.12); color: var(--success);
    border: 1px solid rgba(74,222,128,0.28);
  }
  .card .badge.rendering {
    background: rgba(250,204,21,0.1); color: var(--warning);
    border: 1px solid rgba(250,204,21,0.28);
  }
  .card .badge .dot {
    width: 5px; height: 5px; border-radius: 50%;
  }
  .card .badge.done .dot { background: var(--success); }
  .card .badge.rendering .dot { background: var(--warning); animation: breatheWarn 1.2s infinite; }

  .card .meta { padding: 16px 18px; }
  .card .title {
    font-family: var(--serif); font-size: 18px; font-weight: 400;
    letter-spacing: -0.01em; line-height: 1.25; margin-bottom: 6px; color: var(--text);
  }
  .card .brief {
    font-size: 13px; color: var(--text-2); line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    margin-bottom: 14px;
  }
  .card .footer {
    display: flex; gap: 8px; padding-top: 12px; border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .btn {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em;
    padding: 8px 14px; border-radius: 8px;
    background: var(--surface-2); border: 1px solid var(--border-2);
    color: var(--text); cursor: pointer; transition: all .18s ease;
    text-decoration: none; display: inline-block;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }
  .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .btn.primary:hover { background: var(--text); color: #000; border-color: var(--text); }

  .card .timestamps {
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--mono); font-size: 10.5px; color: var(--text-3);
    flex-wrap: wrap; gap: 4px;
  }

  /* empty state */
  .empty {
    padding: 80px 24px; text-align: center;
    border: 1px dashed var(--border); border-radius: 18px;
    background: var(--surface);
  }
  .empty .icon { font-size: 36px; margin-bottom: 16px; opacity: 0.4; }
  .empty .big {
    font-family: var(--serif); font-style: italic; font-size: 26px;
    color: var(--text-2); margin-bottom: 10px;
  }
  .empty .sub { color: var(--text-3); font-size: 14px; font-family: var(--mono); margin-bottom: 24px; }
  .empty .call-link {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 18px; color: var(--text);
    padding: 14px 22px; border-radius: 12px;
    background: linear-gradient(180deg, rgba(103,232,249,0.08) 0%, rgba(103,232,249,0.02) 100%);
    border: 1px solid rgba(103,232,249,0.22);
    transition: all .2s ease;
  }
  .empty .call-link:hover { border-color: var(--accent); transform: translateY(-1px); text-decoration: none; }
  .empty .call-link .pulse {
    width: 8px; height: 8px; border-radius: 50%; background: var(--success);
    animation: breatheGreen 1.6s infinite;
  }
</style>
</head>
<body>
<nav class="topnav"><div class="inner">
  <a href="/" class="brand" style="text-decoration:none"><span class="glyph"></span>CONDUIT</a>
  <div style="display:flex; gap: 12px; align-items: center;">
    <a href="/how" class="nav-chip">How it works</a>
    <a class="phone-cta" href="tel:+14434648118"><span class="pulse"></span>+1 (443) 464-8118</a>
  </div>
</div></nav>

<div class="wrap">
  <div class="page-header">
    <div>
      <h1>Your <em>studio</em></h1>
      <div class="sub" id="phone-display"></div>
    </div>
    <div class="actions">
      <button class="copy-btn" id="copy-url-btn" onclick="copyStudioUrl()">
        <span class="icon">⎘</span>
        Copy your studio link
      </button>
      <a class="phone-cta" href="tel:+14434648118"><span class="pulse"></span>New film</a>
    </div>
  </div>

  <div id="live-banner-wrap"></div>

  <div class="section-head">
    <h2>Your films</h2>
    <span class="count" id="film-count"></span>
  </div>

  <div class="grid" id="films-grid">
    <div style="grid-column: 1 / -1; padding: 40px; text-align: center; font-family: var(--mono); font-size: 12px; color: var(--text-3);">Loading…</div>
  </div>
</div>

<div class="toast" id="toast">Link copied</div>

<script>
const TOKEN = location.pathname.split('/').filter(Boolean).pop();
const PHONE_KEY = 'conduit_phone';

function timeAgo(ts) {
  const s = Math.floor((Date.now() / 1000) - ts);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function maskPhone(p) {
  if (!p) return '';
  const d = p.replace(/\D/g,'');
  if (d.length === 11) return `+${d[0]} (***) ***-${d.slice(-4)}`;
  if (d.length === 10) return `(***) ***-${d.slice(-4)}`;
  return p.slice(0,-4).replace(/\d/g,'*') + p.slice(-4);
}

function showToast(msg, color) {
  const el = document.getElementById('toast');
  el.textContent = msg || 'Copied';
  if (color) el.style.color = color;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function copyStudioUrl() {
  navigator.clipboard.writeText(location.href).then(() => {
    showToast('Studio link copied', 'var(--accent)');
    const btn = document.getElementById('copy-url-btn');
    const orig = btn.innerHTML;
    btn.innerHTML = '<span class="icon">✓</span> Copied!';
    btn.style.color = 'var(--success)';
    btn.style.borderColor = 'rgba(74,222,128,0.35)';
    setTimeout(() => {
      btn.innerHTML = orig;
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 1800);
  });
}

function renderBanner(active) {
  const wrap = document.getElementById('live-banner-wrap');
  if (!active) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = `<div class="live-banner">
    <div class="left">
      <div class="live-dot"></div>
      <div>
        <div class="title">${active.title || 'Untitled — rendering now'}</div>
        <div class="meta">Shot rendering in progress · started ${timeAgo(active.created_at)}</div>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap: 12px;">
      <div class="live-progress">
        <div class="bar-wrap"><div class="bar" id="live-bar" style="width: 40%"></div></div>
        <span class="pct" id="live-pct">…</span>
      </div>
      <a class="watch-btn" href="/call/${active.call_id}">Watch live →</a>
    </div>
  </div>`;
  // subscribe to live events for this call
  const es = new EventSource('/events/' + active.call_id);
  ['shot.status','shot.keyframe','shot.clip'].forEach(ev => {
    es.addEventListener(ev, async () => {
      const r = await fetch('/api/session/' + active.call_id);
      if (!r.ok) return;
      const s = await r.json();
      const shots = s.shots || [];
      const done = shots.filter(x => x.status === 'done').length;
      const pct = shots.length ? Math.round(done / shots.length * 100) : 0;
      const bar = document.getElementById('live-bar');
      const pctEl = document.getElementById('live-pct');
      if (bar) bar.style.width = pct + '%';
      if (pctEl) pctEl.textContent = pct + '%';
    });
  });
  es.addEventListener('session.finalized', () => { location.reload(); });
}

function renderGrid(calls) {
  const grid = document.getElementById('films-grid');
  const count = document.getElementById('film-count');
  count.textContent = calls.length + ' film' + (calls.length !== 1 ? 's' : '');
  if (!calls.length) {
    grid.innerHTML = `<div class="empty" style="grid-column: 1 / -1;">
      <div class="icon">🎬</div>
      <div class="big">Your first film is one call away</div>
      <div class="sub">Call the number, describe your ad, watch it render live.</div>
      <a class="call-link" href="tel:+14434648118"><span class="pulse"></span>+1 (443) 464-8118</a>
    </div>`;
    return;
  }
  grid.innerHTML = calls.map((c, i) => {
    const isRender = !c.finalized_at;
    const hasVideo = !!c.video_path;
    const fname = c.video_path ? c.video_path.split('/').pop() : null;
    const videoSrc = fname ? `/videos/${c.call_id}/${fname}` : null;
    const thumb = hasVideo
      ? `<video src="${videoSrc}" autoplay muted loop playsinline></video>`
      : isRender
        ? `<div class="empty"><div class="skel-bars"><span></span><span></span><span></span><span></span></div><div style="margin-top:8px">Rendering…</div></div>`
        : `<div class="empty">No video yet</div>`;
    const badge = hasVideo
      ? `<span class="badge done"><span class="dot"></span>Done</span>`
      : isRender
        ? `<span class="badge rendering"><span class="dot"></span>Live</span>`
        : '';
    const actions = hasVideo
      ? `<a class="btn primary" href="/call/${c.call_id}">Edit →</a>
         <a class="btn" href="/videos/${c.call_id}/${fname}" download="${c.call_id}.mp4">Download</a>
         <a class="btn" href="/call/${c.call_id}">View</a>`
      : isRender
        ? `<a class="btn primary" href="/call/${c.call_id}">Watch live →</a>`
        : `<a class="btn" href="/call/${c.call_id}">View</a>`;
    return `<div class="card" style="animation-delay: ${i * 60}ms">
      <div class="thumb">
        ${thumb}
        ${badge}
      </div>
      <div class="meta">
        <div class="title">${c.title || 'Untitled'}</div>
        ${c.brief ? `<div class="brief">${c.brief}</div>` : ''}
        <div class="footer">
          <div style="display:flex; gap:8px; flex:1; flex-wrap:wrap;">${actions}</div>
        </div>
        <div class="timestamps" style="margin-top: 10px;">
          <span>${timeAgo(c.created_at)}</span>
          <span>${c.shot_count || 0} shot${c.shot_count !== 1 ? 's' : ''}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function load() {
  try {
    const r = await fetch('/api/u/' + TOKEN);
    if (!r.ok) { throw new Error('not found'); }
    const d = await r.json();
    const phone = d.user?.phone_e164;
    if (phone) {
      document.getElementById('phone-display').textContent = maskPhone(phone);
    }
    const calls = d.calls || [];
    const active = calls.find(c => !c.finalized_at);
    renderBanner(active);
    renderGrid(calls);
  } catch(e) {
    document.getElementById('films-grid').innerHTML =
      `<div style="grid-column:1/-1; text-align:center; color:var(--text-3); font-family:var(--mono); padding:40px">
        Could not load films — try refreshing.
      </div>`;
  }
}

load();
setInterval(load, 12000);
</script>
</body></html>
